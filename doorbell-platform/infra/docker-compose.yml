version: '3.9'
services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
    environment:
      PORT: 8080
      SQLITE_PATH: /app/data/doorbell.db
      JWT_SECRET: super-secret
      CORS_ORIGIN: http://localhost
      ICE_SERVERS_JSON: '[{"urls":"stun:stun.l.google.com:19302"},{"urls":"turn:localhost:3478","username":"doorbell","credential":"doorbellpass"}]'
      VAPID_PUBLIC_KEY: PUBLIC_KEY_PLACEHOLDER
      VAPID_PRIVATE_KEY: PRIVATE_KEY_PLACEHOLDER
    volumes:
      - backend_data:/app/data
    networks: [doorbell]

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend/Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_PEER_HOST: localhost
        VITE_PEER_PORT: 9000
        VITE_PEER_PATH: /peerjs
    networks: [doorbell]

  peerjs-server:
    build:
      context: ..
      dockerfile: infra/docker/peerjs/Dockerfile
    networks: [doorbell]

  coturn:
    image: coturn/coturn
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./docker/coturn/turnserver.conf:/etc/coturn/turnserver.conf
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    networks: [doorbell]

  nginx:
    image: nginx:alpine
    depends_on: [frontend, backend, peerjs-server]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks: [doorbell]

networks:
  doorbell:

volumes:
  backend_data:
